<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#f5f5f7" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#0f1012" media="(prefers-color-scheme: dark)">
<title>Cobra Digitize · Digitizing Queue</title>
<link rel="manifest" href="./manifest.json">
<style>
  :root{
    --bg:#f5f5f7; --panel:#ffffff; --panel-2:#fafafb; --hover:#fbfbfd;
    --ink:#1d1d1f; --muted:#86868b; --line:#ececee; --line-2:#f2f4f7;
    --accent:#0071e3; --accent-weak:#eaf3fe; --brand:#e0a400;
    --q:#5a5a5f; --qbg:#eeeef0; --qdot:#8e8e93;
    --m:#a86500; --mbg:#fdf0dc; --mdot:#d99000;
    --d:#137a3a; --dbg:#e7f7ee; --ddot:#1a9e4b;
    --puff:#6d3bff; --puffbg:#efeaff;
    --focus:#0071e3;
    --sh-sm:0 1px 2px rgba(16,24,40,.05);
    --sh-md:0 1px 3px rgba(16,24,40,.05),0 12px 34px rgba(16,24,40,.07);
    --sh-pop:0 8px 30px rgba(0,0,0,.18),0 0 0 1px rgba(0,0,0,.05);
    --ring:rgba(0,0,0,.14);
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#0f1012; --panel:#1a1c1e; --panel-2:#202224; --hover:#232527;
      --ink:#f2f2f4; --muted:#98999e; --line:#2a2c2f; --line-2:#242628;
      --accent:#0a84ff; --accent-weak:#12233a; --brand:#f0b420;
      --q:#b6b7bc; --qbg:#2c2e31; --qdot:#8e8e93;
      --m:#f0b64a; --mbg:#3a2c12; --mdot:#e6a52e;
      --d:#5fd08a; --dbg:#123322; --ddot:#37c46f;
      --puff:#b39dff; --puffbg:#2a2340;
      --focus:#4aa3ff; --ring:rgba(255,255,255,.22);
      --sh-md:0 1px 3px rgba(0,0,0,.4),0 12px 34px rgba(0,0,0,.5);
      --sh-pop:0 10px 34px rgba(0,0,0,.6),0 0 0 1px rgba(255,255,255,.06);
    }
  }
  :root[data-theme="light"]{
    --bg:#f5f5f7; --panel:#ffffff; --panel-2:#fafafb; --hover:#fbfbfd;
    --ink:#1d1d1f; --muted:#86868b; --line:#ececee; --line-2:#f2f4f7;
    --accent:#0071e3; --accent-weak:#eaf3fe; --brand:#e0a400;
    --q:#5a5a5f; --qbg:#eeeef0; --qdot:#8e8e93; --m:#a86500; --mbg:#fdf0dc; --mdot:#d99000;
    --d:#137a3a; --dbg:#e7f7ee; --ddot:#1a9e4b; --puff:#6d3bff; --puffbg:#efeaff;
    --focus:#0071e3; --ring:rgba(0,0,0,.14);
    --sh-md:0 1px 3px rgba(16,24,40,.05),0 12px 34px rgba(16,24,40,.07);
    --sh-pop:0 8px 30px rgba(0,0,0,.18),0 0 0 1px rgba(0,0,0,.05);
  }
  :root[data-theme="dark"]{
    --bg:#0f1012; --panel:#1a1c1e; --panel-2:#202224; --hover:#232527;
    --ink:#f2f2f4; --muted:#98999e; --line:#2a2c2f; --line-2:#242628;
    --accent:#0a84ff; --accent-weak:#12233a; --brand:#f0b420;
    --q:#b6b7bc; --qbg:#2c2e31; --qdot:#8e8e93; --m:#f0b64a; --mbg:#3a2c12; --mdot:#e6a52e;
    --d:#5fd08a; --dbg:#123322; --ddot:#37c46f; --puff:#b39dff; --puffbg:#2a2340;
    --focus:#4aa3ff; --ring:rgba(255,255,255,.22);
    --sh-md:0 1px 3px rgba(0,0,0,.4),0 12px 34px rgba(0,0,0,.5);
    --sh-pop:0 10px 34px rgba(0,0,0,.6),0 0 0 1px rgba(255,255,255,.06);
  }

  :root[data-theme="warm"]{
    --bg:#f2ede3; --panel:#fbf8f2; --panel-2:#f0eadf; --hover:#f6f1e8;
    --ink:#2b2620; --muted:#8a8175; --line:#e6ddcd; --line-2:#efe8db;
    --accent:#b8791f; --accent-weak:#f6ecd6; --brand:#c8871a;
    --q:#6a6154; --qbg:#eae2d3; --qdot:#a99a82; --m:#a86500; --mbg:#f6e6cc; --mdot:#c98a20;
    --d:#3f7a3a; --dbg:#e2efd8; --ddot:#4f9a45; --puff:#7c4dff; --puffbg:#efeaff;
    --focus:#b8791f; --ring:rgba(60,40,10,.18);
    --sh-sm:0 1px 2px rgba(80,60,20,.06);
    --sh-md:0 1px 3px rgba(80,60,20,.07),0 12px 30px rgba(80,60,20,.10);
    --sh-pop:0 8px 30px rgba(80,60,20,.22),0 0 0 1px rgba(80,60,20,.06);
  }

  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Inter,system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;transition:background .2s,color .2s}
  :focus-visible{outline:2.5px solid var(--focus);outline-offset:2px;border-radius:8px}
  .wrap{max-width:100%;margin:0 auto;padding:18px 20px 72px;transition:padding-right .26s cubic-bezier(.32,.72,0,1)}
  @media (min-width:900px){
    body.dm-open .wrap{padding-right:412px}   /* dock: make room for the sidebar so nothing is hidden */
    body.dm-open .dmscrim{display:none}
    body.dm-open thead th{top:0}
  }
  .folderext{display:block;margin-top:4px;font-size:11px;color:var(--muted);text-decoration:none;white-space:nowrap}
  .folderext:hover{color:var(--accent);text-decoration:underline}

  /* app bar */
  .bar{display:flex;align-items:center;gap:13px;margin-bottom:18px}
  .mark{width:40px;height:40px;border-radius:11px;background:linear-gradient(135deg,var(--brand),#f6c453);
    color:#231a00;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:20px;flex-shrink:0;
    box-shadow:0 4px 14px rgba(224,165,0,.3)}
  .brand{min-width:0}
  .brand .n{font-weight:700;font-size:16px;letter-spacing:-.3px;line-height:1.05}
  .brand .s{font-size:11.5px;color:var(--muted);letter-spacing:.3px}
  .barspace{flex:1}
  .iconbtn{background:var(--panel);border:1px solid var(--line);border-radius:11px;width:40px;height:40px;
    font-size:17px;cursor:pointer;color:var(--ink);display:inline-flex;align-items:center;justify-content:center;transition:transform .1s}
  .iconbtn:active{transform:scale(.93)}
  .iconbtn:disabled{opacity:.32;cursor:default}
  .iconbtn:disabled:active{transform:none}
  .folderrow .cnt2{display:block;font-size:11px;color:var(--muted);font-weight:600;margin-top:2px}
  .iconbtn.spin svg,.iconbtn.spin span{animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* title + sync */
  .titlerow{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:16px}
  h1{margin:0;font-size:24px;font-weight:750;letter-spacing:-.5px;line-height:1.1}
  .sync{font-size:12.5px;color:var(--muted);margin-top:5px;display:inline-flex;align-items:center;gap:7px}
  .dot{width:7px;height:7px;border-radius:50%;display:inline-block}
  .dot.live{background:var(--ddot);box-shadow:0 0 0 3px color-mix(in srgb,var(--ddot) 22%,transparent)}
  .dot.samp{background:var(--mdot);box-shadow:0 0 0 3px color-mix(in srgb,var(--mdot) 22%,transparent)}
  .search{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:10px 13px;font-size:14px;
    width:250px;max-width:100%;color:var(--ink);box-shadow:var(--sh-sm)}
  .search::placeholder{color:var(--muted);opacity:.8}

  /* filter / count chips */
  .chips{display:flex;gap:9px;margin-bottom:16px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
  .chips::-webkit-scrollbar{display:none}
  .chip-f{flex:0 0 auto;display:inline-flex;align-items:center;gap:8px;background:var(--panel);
    border:1px solid var(--line);border-radius:12px;padding:9px 14px;font-size:13.5px;font-weight:600;
    color:var(--ink);cursor:pointer;box-shadow:var(--sh-sm);transition:border-color .15s,background .15s}
  .chip-f .cdot{width:8px;height:8px;border-radius:50%}
  .chip-f .cnt{font-variant-numeric:tabular-nums;color:var(--muted);font-weight:700;
    background:var(--panel-2);border-radius:20px;padding:1px 8px;font-size:12px}
  .chip-f.on{border-color:var(--accent);background:var(--accent-weak)}
  .chip-f.on .cnt{color:var(--accent)}

  /* table */
  .card{background:var(--panel);border-radius:18px;box-shadow:var(--sh-md);overflow:hidden}
  .scroll{overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:13.5px;min-width:1160px}
  thead th{background:var(--panel-2);text-align:left;color:var(--muted);font-size:11px;font-weight:700;
    letter-spacing:.6px;text-transform:uppercase;padding:13px 14px;border-bottom:1px solid var(--line);white-space:nowrap;position:sticky;top:0;z-index:2}
  thead th.grp{border-left:1px solid var(--line)}
  tbody td{padding:14px;border-bottom:1px solid var(--line-2);vertical-align:top}
  tbody tr:last-child td{border-bottom:none}
  tbody tr{transition:background .12s}
  tbody tr:hover{background:var(--hover)}

  .pill{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:700;padding:5px 11px;
    border-radius:99px;white-space:nowrap;border:1px solid transparent;font-family:inherit;line-height:1}
  .pill::before{content:"";width:6px;height:6px;border-radius:50%;background:currentColor}
  .pill.act{cursor:pointer}
  .pill.act::after{content:"⌄";margin-left:1px;font-size:12px;opacity:.6}
  .p-q{background:var(--qbg);color:var(--q)} .p-m{background:var(--mbg);color:var(--m)} .p-d{background:var(--dbg);color:var(--d)}
  tbody td .pill{white-space:normal;text-align:left;max-width:100%}
  /* per-column alignment: Order + Front/Back/Left/Right centered; rest left */
  thead th:nth-child(3),tbody td:nth-child(3),
  thead th:nth-child(6),tbody td:nth-child(6),
  thead th:nth-child(7),tbody td:nth-child(7),
  thead th:nth-child(8),tbody td:nth-child(8),
  thead th:nth-child(9),tbody td:nth-child(9){text-align:center}
  /* placement + folder cells look/behave like links */
  .plc .chip{color:var(--accent)}
  .plc:hover .chip .nm{text-decoration:underline}
  .plc .chip .nm{cursor:pointer}
  /* row-height modes (Expand rows) */
  .card table[data-rh="compact"] tbody td{padding:7px 14px}
  .card table[data-rh="expanded"] tbody td{padding:24px 14px}
  /* folder viewer modal */
  .fscrim{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:95;opacity:0;pointer-events:none;transition:opacity .2s}
  .fscrim.open{opacity:1;pointer-events:auto}
  .fmodal{position:fixed;z-index:96;left:50%;top:50%;transform:translate(-50%,-47%) scale(.98);opacity:0;pointer-events:none;
    width:min(940px,94vw);height:min(680px,86vh);background:var(--panel);border-radius:16px;box-shadow:var(--sh-pop);
    display:flex;flex-direction:column;overflow:hidden;transition:opacity .2s,transform .2s}
  .fmodal.open{opacity:1;pointer-events:auto;transform:translate(-50%,-50%) scale(1)}
  .fm-head{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid var(--line);font-weight:700;font-size:15px}
  .fm-head .fm-actions{margin-left:auto;display:flex;align-items:center;gap:10px}
  .fm-open{font-size:12.5px;color:var(--accent);text-decoration:none;font-weight:600;white-space:nowrap}
  .fm-head button{background:var(--panel-2);border:none;border-radius:9px;width:32px;height:32px;font-size:15px;cursor:pointer;color:var(--ink)}
  .fm-frame{flex:1;border:0;width:100%;background:var(--panel-2)}
  /* placement cell: stacked + centered (name over size) */
  .plcbox{display:flex;flex-direction:column;align-items:center;gap:2px;text-align:center;line-height:1.3}
  .plcbox .pnm{font-weight:600;font-size:12.5px}
  .plcbox .psz{color:color-mix(in srgb,var(--muted) 78%,transparent);font-size:12px;font-variant-numeric:tabular-nums}
  .plcbox .pacts{display:flex;gap:2px;align-items:center;margin-top:1px}
  .plc .flink{color:var(--accent);text-decoration:none;font-weight:600}
  .plc .flink:hover{text-decoration:underline}
  .plc .attach{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:7px;background:var(--panel-2);color:var(--muted);font-size:12px;cursor:pointer;vertical-align:middle}
  .plc .attach:hover{background:var(--accent-weak)}
  .plc .addf{color:color-mix(in srgb,var(--muted) 60%,transparent);cursor:pointer;font-weight:500;font-size:12.5px}
  .plc .addf:hover{color:var(--accent)}
  .plc .rmv{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:6px;color:var(--muted);font-size:11px;cursor:pointer}
  .plc .rmv:hover{background:#fde3e9;color:#e11d48}
  /* editable cells */
  td.cell{cursor:default}
  td.cell.sel{box-shadow:inset 0 0 0 2px var(--accent);border-radius:6px}
  .olink{color:var(--accent);text-decoration:none;font-weight:600;font-variant-numeric:tabular-nums}
  .olink:hover{text-decoration:underline}
  .celledit{width:100%;font:inherit;color:var(--ink);background:var(--panel);border:1.5px solid var(--accent);border-radius:7px;padding:6px 8px;box-shadow:0 2px 10px rgba(0,0,0,.12);resize:vertical}
  textarea.celledit{min-height:64px;line-height:1.4}
  .edit-hint{display:block;font-size:10px;color:var(--muted);margin-top:3px}
  .jc .pr .attach{margin-left:auto}
  /* Drive Manager sidebar */
  .dmscrim{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:97;opacity:0;pointer-events:none;transition:opacity .2s}
  .dmscrim.open{opacity:1;pointer-events:auto}
  .dm{position:fixed;top:0;right:0;height:100%;width:390px;max-width:94vw;background:var(--panel);z-index:98;
    box-shadow:-14px 0 44px rgba(0,0,0,.3);transform:translateX(103%);transition:transform .26s cubic-bezier(.32,.72,0,1);display:flex;flex-direction:column}
  .dm.open{transform:translateX(0)}
  .dm-h{display:flex;align-items:center;justify-content:space-between;padding:18px 18px 12px}
  .dm-h .t{font-size:18px;font-weight:750;letter-spacing:-.3px}
  .dm-h button{background:var(--panel-2);border:none;border-radius:9px;width:32px;height:32px;font-size:15px;cursor:pointer;color:var(--ink)}
  .dm-sub{display:flex;gap:9px;padding:0 18px}
  .dm-search{flex:1;background:var(--panel-2);border:1px solid var(--line);border-radius:10px;padding:9px 12px;font-size:13.5px;color:var(--ink)}
  .dm-filter{background:var(--panel-2);border:1px solid var(--line);border-radius:10px;padding:0 13px;font-size:13px;color:var(--muted);display:flex;align-items:center;gap:6px;cursor:pointer}
  .dm-target{margin:12px 18px 2px;font-size:12px;color:var(--accent);background:var(--accent-weak);border-radius:9px;padding:9px 12px;font-weight:600;display:none}
  .dm-target.on{display:block}
  .dm-meta{display:flex;align-items:center;justify-content:space-between;padding:12px 18px 8px}
  .dm-meta .rf{font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.6px}
  .dm-meta .rf b{color:var(--ink)}
  .dm-refresh{color:var(--accent);font-weight:600;font-size:13px;background:none;border:none;cursor:pointer;display:inline-flex;gap:5px;align-items:center}
  .dm-list{flex:1;overflow-y:auto;padding:4px 14px 22px;display:flex;flex-direction:column;gap:10px}
  .fcard{display:flex;align-items:center;gap:12px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:10px;cursor:pointer;transition:border-color .15s,background .15s}
  .fcard:hover{border-color:var(--accent);background:var(--accent-weak)}
  .fcard .thumb{width:58px;height:44px;border-radius:8px;background-color:var(--panel-2);background-size:cover;background-position:center;background-repeat:no-repeat;flex-shrink:0;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:16px}
  .fcard .fi{min-width:0;flex:1}
  .fcard .fn{font-size:13px;font-weight:650;line-height:1.25;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
  .fcard .fm{font-size:11.5px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:.3px}
  .fcard .dots{color:var(--muted);font-size:18px;align-self:flex-start;padding:0 2px}
  .dm-empty{color:var(--muted);text-align:center;padding:44px 14px;font-size:13.5px;line-height:1.5}
  .dm-target .back{cursor:pointer;color:var(--accent);font-weight:700}
  .dm-up{display:none;margin:8px 14px 2px;border:1.5px dashed var(--line);border-radius:12px;padding:14px;text-align:center;color:var(--muted);font-size:12.5px;cursor:pointer}
  .dm-up.on{display:block}
  .dm-up b{color:var(--accent)}
  .dm-up.drag{border-color:var(--accent);background:var(--accent-weak);color:var(--accent)}
  .folderrow{display:flex;align-items:center;gap:12px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:11px;cursor:pointer;transition:border-color .15s,background .15s}
  .folderrow:hover{border-color:var(--accent);background:var(--accent-weak)}
  .folderrow .thumb{width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-size:18px;background:var(--panel-2);border-radius:8px}
  .folderrow .fi2{font-weight:650;font-size:13.5px;flex:1;min-width:0}
  .folderrow .dots{color:var(--muted);font-size:18px}
  .fcard .dl{color:var(--muted);font-size:17px;text-decoration:none;padding:0 4px}
  .fcard .dl:hover{color:var(--accent)}
  .order{font-weight:600;font-variant-numeric:tabular-nums;letter-spacing:.2px}
  .puff{font-size:10px;font-weight:800;color:#fff;background:#d93a34;border-radius:6px;padding:3px 6px;letter-spacing:.4px;white-space:nowrap;box-shadow:0 1px 2px rgba(217,58,52,.35)}
  .details{max-width:320px;line-height:1.45;color:var(--ink)}
  .details .qty{display:inline-block;margin-left:6px;font-size:11px;font-weight:700;color:var(--m);background:var(--mbg);border-radius:6px;padding:2px 7px;white-space:nowrap}
  .details .flag{display:inline-block;margin-left:6px;font-size:11px;font-weight:700;color:var(--accent);background:var(--accent-weak);border-radius:6px;padding:2px 7px;white-space:nowrap}
  .plc{border-left:1px solid var(--line)}
  .chip .nm{font-weight:600;font-size:12.5px} .chip .sz{color:var(--muted);font-variant-numeric:tabular-nums;font-size:12px;white-space:nowrap}
  .none{color:color-mix(in srgb,var(--muted) 55%,transparent)}
  .rownum{color:var(--muted);font-variant-numeric:tabular-nums;font-weight:600;font-size:12px;text-align:right;width:34px;white-space:nowrap}
  th.rownum-h{width:34px;text-align:right}
  .details .dl{display:block;line-height:1.5}
  .details .dl b{display:inline-block;min-width:42px;font-size:10px;font-weight:800;letter-spacing:.4px;color:var(--muted);vertical-align:top}
  .details .dlead{display:block;margin-bottom:3px;font-weight:600}
  .jc .rn{font-size:11px;font-weight:700;color:var(--muted);font-variant-numeric:tabular-nums;background:var(--panel-2);border-radius:6px;padding:2px 7px;margin-right:2px}
  /* drag-to-reorder */
  .rownum{white-space:nowrap}
  .grip{display:none;cursor:grab;color:var(--muted);font-size:13px;margin-right:5px;touch-action:none;user-select:none;vertical-align:middle}
  .reorderable .grip{display:inline}
  .grip:active{cursor:grabbing}
  tr.dragging{opacity:.45}
  tr.drop-before td{box-shadow:inset 0 3px 0 -1px var(--accent)}
  tr.drop-after td{box-shadow:inset 0 -3px 0 -1px var(--accent)}
  /* column resize */
  thead th{position:relative}
  .rz{position:absolute;top:0;right:-1px;width:9px;height:100%;cursor:col-resize;user-select:none;touch-action:none;z-index:3}
  .rz:hover{background:linear-gradient(var(--accent),var(--accent));background-size:2px 100%;background-position:center;background-repeat:no-repeat;opacity:.5}
  /* clickable artwork cells */
  .plc{cursor:pointer}
  .plc:hover{background:var(--accent-weak)}
  .jc .pr{cursor:pointer;border-radius:8px;margin:-2px -4px;padding:2px 4px}
  .jc .pr:active{background:var(--accent-weak)}
  .thread{display:flex;align-items:center;gap:8px;max-width:190px}
  .sw{display:flex;flex-shrink:0}
  .sw i{width:14px;height:14px;border-radius:50%;box-shadow:inset 0 0 0 1.4px var(--ring);margin-left:-4px}
  .sw i:first-child{margin-left:0}
  .tlabel{font-size:12.5px;color:var(--ink);line-height:1.25}

<script>
/* ===== CONFIG (see cobra/SETUP.md) ===== */

const SMAP={};STATUS.forEach(s=>SMAP[s.key]=s);
function sMeta(raw){const s=(raw||"").trim().toUpperCase();return SMAP[s]||{key:s,label:raw||"Unassigned",bg:null,fg:"var(--muted)",dot:"#b0b0b6",rank:5};}
function isDone(k){return k==="COMPLETED"||k==="CUSTOMER APPROVED";}

/* ===== thread colors ===== */

const PH=Object.keys(COLORS).filter(k=>k.includes(" "));
function swatches(t){if(!t)return[];let x=String(t).toLowerCase();const f=[];for(const p of PH){if(x.includes(p)){f.push(COLORS[p]);x=x.split(p).join("  ");}}for(const w of Object.keys(COLORS)){if(w.includes(" "))continue;const re=new RegExp("\\b"+w+"\\b");if(re.test(x)){f.push(COLORS[w]);x=x.replace(re,"  ");}}return f.slice(0,3);}
function threadLabel(t){if(!t)return"";return String(t).replace(/^\s*thread\s*/i,"").replace(/\s+/g," ").trim().replace(/\bwith\b/gi,"w/");}

/* ===== placement ===== */
function parsePlc(cell){if(!cell||!String(cell).trim())return null;let s=String(cell).trim();let size="";const m=s.match(/([\d.]+)\s*["″'’]?\s*W\b/i);if(m){size=m[1].replace(/\.$/,"")+'" W';s=s.replace(m[0],"");}s=s.replace(/\((front|back|left|right)\)/ig,"").replace(/\b(front|back|left|right)\b/ig,"").replace(/[:]/g,"").replace(/\s{2,}/g," ").replace(/[-–—·|]\s*$/,"").trim();if(s.length>24)s=s.slice(0,23).trim()+"…";return{name:s.toUpperCase(),size};}

/* ===== details ===== */
function detailsHTML(text){if(!text)return'<span class="none">—</span>';let s=String(text).trim();let extra="";
  const q=s.match(/qty\s*[:\-]?\s*(\d+)/i); if(q){extra+=' <span class="qty">Qty '+q[1]+'</span>';s=s.replace(q[0],"");}
  if(/needs?\s+in\s+\w+/i.test(s)){const mm=s.match(/needs?\s+in\s+\w+/i);extra+=' <span class="flag">'+esc(mm[0].replace(/^./,c=>c.toUpperCase()))+'</span>';s=s.replace(mm[0],"");}
  if(/check messages|need more info/i.test(s)){extra+=' <span class="flag">Check messages</span>';s=s.replace(/\(?\s*(check messages|need more info)\s*\)?/ig,"");}
  s=s.replace(/\bthread\b[\s\S]*$/i,"").trim();
  // If the details name placements (FRONT:/BACK:/LEFT:/RIGHT:), break them onto labeled lines
  if(/\b(FRONT|BACK|LEFT|RIGHT)\s*:/i.test(s)){
    const parts=s.split(/\b(FRONT|BACK|LEFT|RIGHT)\s*:/i);
    const lead=(parts[0]||"").replace(/[\/,\-–—]\s*$/,"").trim();
    let html=lead?'<span class="dlead">'+esc(lead)+'</span>':'';
    for(let i=1;i<parts.length;i+=2){
      const lab=parts[i].toUpperCase();
      const val=(parts[i+1]||"").replace(/[\/,\-–—]\s*$/,"").replace(/\s{2,}/g," ").trim();
      if(val) html+='<span class="dl"><b>'+lab+'</b> '+esc(val)+'</span>';
    }
    return (html||'<span class="none">—</span>')+extra;
  }
  s=s.replace(/^front:\s*/i,"").replace(/[\/,\-–—]\s*$/,"").replace(/\s{2,}/g," ").trim();
  if(s.length>140)s=s.slice(0,138)+"…";
  return (esc(s)||'<span class="none">—</span>')+extra;}
function jobTitle(j){let s=String(j.details||j.front||j.order||"").trim();s=s.replace(/qty\s*[:\-]?\s*\d+/i,"").replace(/\bthread\b[\s\S]*$/i,"").replace(/^front:\s*/i,"").replace(/\(.*?\)/g,"").replace(/[-–—][\s\S]*$/,"").replace(/[\/,]\s*$/,"").replace(/\s{2,}/g," ").trim();if(s.length>40)s=s.slice(0,38).trim()+"…";return s||"—";}
function esc(x){return String(x==null?"":x).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function jss(s){return String(s==null?"":s).replace(/\\/g,"\\\\").replace(/'/g,"\\'").replace(/"/g,"&quot;").replace(/</g,"&lt;");}

/* ===== CSV ===== */
function parseCSV(text){const rows=[];let row=[],f="",i=0,q=false;while(i<text.length){const c=text[i];if(q){if(c==='"'){if(text[i+1]==='"'){f+='"';i++;}else q=false;}else f+=c;}else{if(c==='"')q=true;else if(c===','){row.push(f);f="";}else if(c==='\n'){row.push(f);rows.push(row);row=[];f="";}else if(c==='\r'){}else f+=c;}i++;}if(f.length||row.length){row.push(f);rows.push(row);}return rows;}

function toJob(v,r,links){var j={_row:r||null,status:v[0]||"",order:v[1]||"",puff:v[2]||"",details:v[3]||"",front:v[4]||"",back:v[5]||"",left:v[6]||"",right:v[7]||"",thread:v[8]||"",folder:v[9]||""};if(links){j.frontUrl=links.front||"";j.backUrl=links.back||"";j.leftUrl=links.left||"";j.rightUrl=links.right||"";j.orderUrl=links.order||"";j.folderUrl=links.folder||"";}return j;}

async function load(){
  const btn=document.getElementById("refresh");btn.classList.add("spin");
  let jobs=null;
  if(CONFIG.APPS_SCRIPT_URL){try{const res=await fetch(CONFIG.APPS_SCRIPT_URL+(CONFIG.APPS_SCRIPT_URL.includes("?")?"&":"?")+"action=list",{cache:"no-store"});if(res.ok){const d=await res.json();const arr=d.rows||d;jobs=arr.map(r=>Array.isArray(r)?toJob(r):toJob(r.values,r.row,r.links));IS_LIVE=true;CAN_WRITE=true;}}catch(e){}}

  const present=STATUS.filter(s=>c[s.key]).sort((a,b)=>a.rank-b.rank);

function threadCell(t){const sw=swatches(t).map(c=>`<i style="background:${c}"></i>`).join("");const l=threadLabel(t);if(!l)return'<span class="none">—</span>';return`<div class="thread"><span class="sw">${sw||'<i style="background:var(--line)"></i>'}</span><span class="tlabel">${esc(l)}</span></div>`;}
function plcCell(c){const p=parsePlc(c);if(!p)return'<span class="none">—</span>';return`<span class="chip"><span class="nm">${esc(p.name)}</span>${p.size?` <span class="sz">${esc(p.size)}</span>`:""}</span>`;}
function plcCellFull(j,i,key){const p=parsePlc(j[key]);const url=j[key+"Url"];
  if(!p) return `<span class="addf" onclick="event.stopPropagation();openDM(${i},'${key}')" title="Attach a file">＋ Add</span>`;
  const nm=url?`<a class="flink" href="${esc(url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${esc(p.name)}</a>`:`<span class="nm">${esc(p.name)}</span>`;
  return `<div class="plcbox"><div class="pnm">${nm}</div>${p.size?`<div class="psz">${esc(p.size)}</div>`:""}<div class="pacts"><span class="attach" onclick="event.stopPropagation();openDM(${i},'${key}')" title="Attach / replace file">📎</span><span class="rmv" onclick="event.stopPropagation();removeFile(${i},'${key}')" title="Remove file">✕</span></div></div>`;}
function orderCell(j,i){ if(EDIT&&EDIT.i===i&&EDIT.f==='order') return editBox(j.order,false);
  const num=esc(j.order)||'<span class="none">—</span>';
  return j.orderUrl?`<a class="olink" href="${esc(j.orderUrl)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${num}</a>`:`<span class="order">${num}</span>`; }
function detailsCellR(j,i){ return (EDIT&&EDIT.i===i&&EDIT.f==='details')?editBox(j.details,true):detailsHTML(j.details); }
function threadCellR(j,i){ return (EDIT&&EDIT.i===i&&EDIT.f==='thread')?editBox(j.thread,false):threadCell(j.thread); }
function editBox(v,multi){ v=esc(String(v==null?"":v)); return multi?`<textarea id="editinput" class="celledit">${v}</textarea><span class="edit-hint">Enter = new line · ⌘/Ctrl+Enter to save · Esc to cancel</span>`:`<input id="editinput" class="celledit" value="${v}"><span class="edit-hint">Enter to save · Esc to cancel</span>`; }
function folderIdFromUrl(u){var m=String(u||"").match(/[-\w]{25,}/);return m?m[0]:"";}
function folderCell(j){const f=j.folder;if(!f||!f.trim())return'<span class="none">—</span>';const fid=folderIdFromUrl(j.folderUrl);
  const ext=j.folderUrl?`<a class="folderext" href="${esc(j.folderUrl)}" target="_blank" rel="noopener">Open in new window ↗</a>`:"";
  return`<a class="folder" href="javascript:void(0)" onclick="openBrowse('${jss(fid)}','${jss(f)}')">🗂 ${esc(f)}</a>${ext}`;}
function pill(j,i){const m=sMeta(j.status);const st=m.bg?`background:${m.bg};color:${m.fg};border-color:transparent`:`background:transparent;color:var(--muted);border-color:var(--line)`;return `<button class="pill act" style="${st}" onclick="openPicker(event,${i})" aria-haspopup="true">${esc(m.label)}</button>`;}
function sortJobs(l){return l;} /* mirror the sheet's row order (manual/drag order preserved) */
function listNow(){const q=(document.getElementById("search").value||"").toLowerCase().trim();let l=JOBS.filter(j=>{const m=sMeta(j.status);if(FILTER==="all"){}else if(m.key!==FILTER)return false;if(q){const h=[j.order,j.details,j.thread,j.front,j.back,j.left,j.right,j.folder].join(" ").toLowerCase();if(!h.includes(q))return false;}return true;});return sortJobs(l);}
function render(){const list=listNow();const tb=document.getElementById("rows"),cd=document.getElementById("cards");
  if(!list.length){tb.innerHTML=`<tr><td colspan="11"><div class="empty">No jobs in this view.</div></td></tr>`;cd.innerHTML=`<div class="empty">No jobs in this view.</div>`;}
  else{
    tb.innerHTML=list.map(j=>{const i=JOBS.indexOf(j);const m=sMeta(j.status);const num=/^[#]?\d{6,}$/.test(String(j.order).trim());
      return `<tr data-idx="${i}" class="${isDone(m.key)?'completed':'active'}"><td class="rownum"><span class="grip" title="Drag to reorder">⠿</span><span class="rn-n">${j._row||''}</span></td><td>${pill(j,i)}</td><td class="order cell" data-i="${i}" data-f="order">${orderCell(j,i)}</td><td>${j.puff&&j.puff.trim()?'<span class="puff">3D</span>':'<span class="none">—</span>'}</td><td class="details cell" data-i="${i}" data-f="details">${detailsCellR(j,i)}</td><td class="plc cell" data-i="${i}" data-f="front">${plcCellFull(j,i,'front')}</td><td class="plc cell" data-i="${i}" data-f="back">${plcCellFull(j,i,'back')}</td><td class="plc cell" data-i="${i}" data-f="left">${plcCellFull(j,i,'left')}</td><td class="plc cell" data-i="${i}" data-f="right">${plcCellFull(j,i,'right')}</td><td class="cell" data-i="${i}" data-f="thread">${threadCellR(j,i)}</td><td>${folderCell(j)}</td></tr>`;}).join("");
    cd.innerHTML=list.map(j=>{const i=JOBS.indexOf(j);
      const pl=[["FRONT","front",""],["BACK","back","b"],["LEFT","left","l"],["RIGHT","right","r"]].map(([lab,key,c])=>{const p=parsePlc(j[key]);if(!p)return"";const url=j[key+"Url"];const nm=url?`<a class="flink" href="${esc(url)}" target="_blank" rel="noopener">${esc(p.name)}</a>`:esc(p.name);return`<div class="pr"><span class="ploc ${c}">${lab}</span><span class="pn">${nm}</span><span class="ps">${p.size?esc(p.size):"—"}</span><span class="attach" onclick="openDM(${JOBS.indexOf(j)},'${key}')" title="Attach a file">📎</span></div>`;}).join("");
      return `<div class="jc"><div class="t"><div class="co"><span class="rn">${j._row||"·"}</span><span class="o">${esc(j.order)||"—"}</span>${j.puff&&j.puff.trim()?'<span class="puff">3D</span>':""}</div>${pill(j,i)}</div><div class="jt">${esc(jobTitle(j))}</div>${pl?`<div class="pl">${pl}</div>`:""}<div class="b">${threadCell(j.thread)}${folderCell(j.folder)}</div></div>`;}).join("");
  }
  const dn=JOBS.filter(j=>isDone(sMeta(j.status).key)).length;
  document.getElementById("count").textContent=`Showing ${list.length} of ${JOBS.length} · ${JOBS.length-dn} active · ${dn} done`;
  refreshReorderable();
  if(EDIT){ const el=document.getElementById("editinput"); if(el){ el.focus(); try{const v=el.value;el.setSelectionRange(v.length,v.length);}catch(_){}
    el.onblur=function(){ if(EDIT) commitEdit(el.value); };
    el.onkeydown=function(ev){ if(ev.key==="Escape"){ev.preventDefault();cancelEdit();}
      else if(ev.key==="Enter"){ if(EDIT.f==="details"){ if(ev.metaKey||ev.ctrlKey){ev.preventDefault();el.onblur=null;commitEdit(el.value);} } else { ev.preventDefault();el.onblur=null;commitEdit(el.value);} } }; } }
  else { applySelection(); }
}

/* ===== status change (popover desktop / sheet mobile) ===== */
let pickIdx=null;
const isMobile=()=>window.matchMedia("(max-width:820px)").matches;
function openPicker(e,i){e.stopPropagation();pickIdx=i;isMobile()?openSheet():openMenu(e);}
function optList(cur,cb){return STATUS.filter(s=>s.key!=="").map(o=>`<div class="${cb}${o.key===cur?' cur':''}" role="menuitem" tabindex="0" data-key="${esc(o.key)}"><span class="sd" style="background:${o.dot}"></span>${esc(o.label)}</div>`).join("");}
function openMenu(e){const cur=sMeta(JOBS[pickIdx].status).key;const m=document.getElementById("menu");m.innerHTML=optList(cur,"mi");const r=e.currentTarget.getBoundingClientRect();m.style.top=(r.bottom+6)+"px";m.style.left=Math.min(r.left,window.innerWidth-192)+"px";m.classList.add("open");}
function closeMenu(){document.getElementById("menu").classList.remove("open");}
function openSheet(){const j=JOBS[pickIdx];document.getElementById("sheetHead").textContent=(j.order||jobTitle(j))+" · change status";document.getElementById("sheetBody").innerHTML=optList(sMeta(j.status).key,"si");document.getElementById("scrim").classList.add("open");document.getElementById("sheet").classList.add("open");}
function closeSheet(){document.getElementById("scrim").classList.remove("open");document.getElementById("sheet").classList.remove("open");}
document.addEventListener("click",e=>{if(!e.target.closest("#menu")&&!e.target.closest(".pill.act"))closeMenu();});
window.addEventListener("scroll",closeMenu,true);
document.addEventListener("keydown",e=>{if(e.key==="Escape"){closeMenu();closeSheet();closeFolder();closeDM();}});
document.getElementById("chips").addEventListener("click",e=>{const b=e.target.closest("[data-key]");if(b)setFilter(b.dataset.key);});
document.getElementById("menu").addEventListener("click",e=>{const o=e.target.closest("[data-key]");if(o)pick(o.dataset.key);});
document.getElementById("sheetBody").addEventListener("click",e=>{const o=e.target.closest("[data-key]");if(o)pick(o.dataset.key);});

function pick(key){if(pickIdx==null)return;const i=pickIdx;closeMenu();closeSheet();
  if(sMeta(JOBS[i].status).key===key)return;
  applyField(i,"status",{text:key,url:""},true);}

/* ===== Drive Manager sidebar (attach a file to Front/Back/Left/Right) ===== */
let DM={files:[],folders:[],view:[],target:null,mode:'attach',folderId:null,folderName:'',stack:[],parent:''};
function humanSize(n){n=+n||0;if(n<1024)return n+" B";if(n<1048576)return (n/1024).toFixed(0)+" KB";return (n/1048576).toFixed(1)+" MB";}
function apiURL(qs){return CONFIG.APPS_SCRIPT_URL+(CONFIG.APPS_SCRIPT_URL.includes("?")?"&":"?")+qs;}
const MOCK_FILES=[
  {name:'KINLEY (RIGHT) - 2.2" W.png',mime:'image/png',size:184000,thumb:'',url:'#'},
  {name:'GRACIE (LEFT) - 1.9" W.png',mime:'image/png',size:172000,thumb:'',url:'#'},
  {name:'3D - TREE KE LOGO (FRONT) - 3.4" W.png',mime:'image/png',size:240000,thumb:'',url:'#'},
  {name:'RDH - 8" W.png',mime:'image/png',size:210000,thumb:'',url:'#'},
  {name:'3D SPRING LAKE (FRONT) - 5" W.png',mime:'image/png',size:265000,thumb:'',url:'#'},
  {name:"IF THE LIGHT IS OFF (RIGHT) - 5\" W.png",mime:'image/png',size:198000,thumb:'',url:'#'},
  {name:'LUCK OR SOMETHING - 5" W.png',mime:'image/png',size:221000,thumb:'',url:'#'}
];
const MOCK_FOLDERS=[{id:'sub1',name:'FRONT',count:4},{id:'sub2',name:'BACK',count:2},{id:'sub3',name:'LEFT',count:1},{id:'sub4',name:'RIGHT',count:0}];
function dmShow(){document.getElementById("dmscrim").classList.add("open");document.getElementById("dm").classList.add("open");document.body.classList.add("dm-open");}
function dmSetUpload(on){document.getElementById("dmUp").classList.toggle("on",!!on);}
function openDM(i,key){
  DM.mode='attach'; const j=JOBS[i]; DM.target={i,key};
  document.getElementById("dm").classList.remove("browse");
  document.getElementById("dmTitle").textContent="Drive Manager";
  const tg=document.getElementById("dmTarget");
  tg.textContent="Attaching to "+key.toUpperCase()+"  ·  "+(j.order||jobTitle(j)); tg.classList.add("on");
  document.getElementById("dmSearch").value=""; dmSetUpload(false);
  dmShow(); dmReload();
}
function openBrowse(folderId,name){
  DM.mode='browse'; DM.target=null; DM.stack=[];
  document.getElementById("dm").classList.add("browse");
  document.getElementById("dmSearch").value=""; dmSetUpload(true);
  dmShow(); browseTo(folderId,name||"Folder");
}
function browseTo(folderId,name){ DM.folderId=folderId; DM.folderName=name||"Folder"; loadBrowse(); }
function enterFolder(id,name){ DM.stack.push({id:DM.folderId,name:DM.folderName}); DM.folderId=id; DM.folderName=name; loadBrowse(); }
function navBack(){ if(!DM.stack.length)return; const p=DM.stack.pop(); DM.folderId=p.id; DM.folderName=p.name; loadBrowse(); }
function closeDM(){document.getElementById("dm").classList.remove("open");document.getElementById("dmscrim").classList.remove("open");document.getElementById("dm").classList.remove("browse");document.body.classList.remove("dm-open");DM.target=null;}
function dmFilter(){ DM.mode==='browse'?dmRenderBrowse():dmRender(); }
function dmRefresh(){ DM.mode==='browse'?loadBrowse():dmReload(); }

async function dmReload(){
  const list=document.getElementById("dmList"); list.innerHTML='<div class="dm-empty">Loading files…</div>';
  document.getElementById("dmTitle").textContent="Drive Manager";
  if(CAN_WRITE && CONFIG.APPS_SCRIPT_URL){
    try{
      const r=await fetch(apiURL("action=listFiles"),{cache:"no-store"}); const d=await r.json();
      if(d && d.files){ DM.files=d.files; }
      else { list.innerHTML='<div class="dm-empty">Update your Apps Script to enable the file picker, then Refresh.</div>'; DM.files=[]; document.getElementById("dmCount").textContent="0"; return; }
    }catch(e){ DM.files=[]; }
  } else { DM.files=MOCK_FILES; }
  dmRender();
}
async function loadBrowse(){
  const list=document.getElementById("dmList"); list.innerHTML='<div class="dm-empty">Loading folder…</div>';
  document.getElementById("dmTitle").textContent=DM.folderName||"Folder";
  if(CAN_WRITE && CONFIG.APPS_SCRIPT_URL && DM.folderId){
    try{
      const r=await fetch(apiURL("action=browse&folderId="+encodeURIComponent(DM.folderId)),{cache:"no-store"}); const d=await r.json();
      if(d && (d.files||d.folders)){ DM.files=d.files||[]; DM.folders=d.folders||[]; DM.parent=(d.folder&&d.folder.parent)||""; if(d.folder&&d.folder.name){DM.folderName=d.folder.name;document.getElementById("dmTitle").textContent=DM.folderName;} }
      else { list.innerHTML='<div class="dm-empty">Couldn\'t open this folder.</div>'; DM.files=[];DM.folders=[]; return; }
    }catch(e){ list.innerHTML='<div class="dm-empty">Couldn\'t open this folder.</div>'; DM.files=[];DM.folders=[]; return; }
  } else if(!DM.folderId && CAN_WRITE){
    list.innerHTML='<div class="dm-empty">This order has no linked Drive folder yet. Link the folder in the sheet and it\'ll open here.</div>'; DM.files=[];DM.folders=[]; document.getElementById("dmCount").textContent="0"; return;
  } else { DM.files=MOCK_FILES.slice(0,4); DM.folders=MOCK_FOLDERS; }  // preview/demo
  dmRenderBrowse();
}
function fileCardHTML(f,i,attach){
  const ext=(f.mime||"").split("/").pop().toUpperCase()||"FILE";
  const sz=f.sizeh||(f.size?humanSize(f.size):"");
  const th=f.thumb?`background-image:url('${esc(f.thumb)}')`:"";
  const dl=f.id?`https://drive.google.com/uc?export=download&id=${esc(f.id)}`:(f.url||"#");
  const act=attach?`onclick="attachFile(${i})"`:`onclick="window.open('${esc(f.url||dl)}','_blank','noopener')"`;
  const right=attach?`<div class="dots">⋯</div>`:`<a class="dl" href="${dl}" target="_blank" rel="noopener" onclick="event.stopPropagation()" title="Download">⬇</a>`;
  return `<div class="fcard" ${act}><div class="thumb" style="${th}">${f.thumb?"":"🖼"}</div><div class="fi"><div class="fn">${esc(f.name)}</div><div class="fm">${esc(ext)}${sz?" · "+esc(sz):""}</div></div>${right}</div>`;
}
function dmRender(){
  const q=(document.getElementById("dmSearch").value||"").toLowerCase().trim();
  const files=DM.files.filter(f=>!q||(f.name||"").toLowerCase().includes(q)); DM.view=files;
  document.getElementById("dmCount").textContent=DM.files.length;
  const list=document.getElementById("dmList");
  list.innerHTML=files.length?files.map((f,i)=>fileCardHTML(f,i,true)).join(""):'<div class="dm-empty">No files found.</div>';
}
const FOLDER_ORDER=["FRONT","BACK","LEFT","RIGHT"];
function folderRank(n){const i=FOLDER_ORDER.indexOf(String(n||"").trim().toUpperCase());return i===-1?99:i;}
function dmRenderBrowse(){
  const q=(document.getElementById("dmSearch").value||"").toLowerCase().trim();
  const folders=DM.folders.filter(f=>!q||(f.name||"").toLowerCase().includes(q))
    .slice().sort((a,b)=>{const ra=folderRank(a.name),rb=folderRank(b.name);return ra!==rb?ra-rb:(String(a.name).toLowerCase()<String(b.name).toLowerCase()?-1:1);});
  const files=DM.files.filter(f=>!q||(f.name||"").toLowerCase().includes(q)); DM.view=files;
  document.getElementById("dmCount").textContent=(DM.folders.length+DM.files.length);
  const tg=document.getElementById("dmTarget"); tg.classList.add("on");
  tg.innerHTML=(DM.stack.length?`<span class="back" onclick="navBack()">‹ Back</span> · `:"")+"📁 "+esc(DM.folderName||"Folder");
  const list=document.getElementById("dmList");
  let html=folders.map(fo=>{const cnt=(fo.count!=null)?`<span class="cnt2">${fo.count} file${fo.count===1?'':'s'} in folder</span>`:"";
    return `<div class="folderrow" onclick="enterFolder('${jss(fo.id)}','${jss(fo.name)}')"><span class="thumb">📁</span><span class="fi2">${esc(fo.name)}${cnt}</span><span class="dots">›</span></div>`;}).join("");
  html+=files.map((f,i)=>fileCardHTML(f,i,false)).join("");
  list.innerHTML=html||'<div class="dm-empty">This folder is empty.</div>';
}
async function doUpload(fileList){
  fileList=[...(fileList||[])]; if(!fileList.length)return;
  if(!(CAN_WRITE&&CONFIG.APPS_SCRIPT_URL&&DM.folderId)){ toast("Open a linked folder (live) to upload here",true); return; }
  toast("Uploading "+fileList.length+" file(s)…");
  for(const file of fileList){
    try{
      const data=await new Promise((res,rej)=>{const rd=new FileReader();rd.onload=()=>res(String(rd.result).split(",").pop());rd.onerror=rej;rd.readAsDataURL(file);});
      await fetch(CONFIG.APPS_SCRIPT_URL,{method:"POST",body:JSON.stringify({action:"upload",folderId:DM.folderId,name:file.name,mime:file.type||"application/octet-stream",data:data})});
    }catch(e){ toast("Upload failed: "+file.name,true); }
  }
  toast("Uploaded ✓"); loadBrowse();
}
function attachFile(vi){
  const f=DM.view[vi]; if(!f||!DM.target)return;
  const {i,key}=DM.target; closeDM();
  applyField(i,key,{text:f.name,url:f.url||""},true);
  toast("Linked "+key.toUpperCase()+" → "+f.name);
}

/* ===== cell selection + inline editing (Order / Details / Thread) + delete-key ===== */
const FIELD_COL={front:"FRONT",back:"BACK",left:"LEFT",right:"RIGHT",order:"ORDER",details:"DETAILS",thread:"THREAD"};
const EDITABLE_TEXT=["order","details","thread"];
function applySelection(){
  document.querySelectorAll("#rows td.sel").forEach(td=>td.classList.remove("sel"));
  if(SELECTED){ const td=document.querySelector(`#rows td[data-i="${SELECTED.i}"][data-f="${SELECTED.f}"]`); if(td)td.classList.add("sel"); }
}
function selectCell(i,f){ SELECTED={i:+i,f}; applySelection(); }
function startEdit(i,f){ if(!EDITABLE_TEXT.includes(f))return; EDIT={i:+i,f}; SELECTED={i:+i,f}; render(); }
function cancelEdit(){ EDIT=null; render(); }
const PLC=["front","back","left","right"];
function fieldGet(j,f){ if(f==="status")return{text:j.status||"",url:""}; if(f==="order")return{text:j.order||"",url:j.orderUrl||""}; if(PLC.includes(f))return{text:j[f]||"",url:j[f+"Url"]||""}; return{text:j[f]||"",url:""}; }
function fieldSet(j,f,text,url){ if(f==="status"){j.status=text;return;} j[f]=text; if(f==="order")j.orderUrl=url||""; if(PLC.includes(f))j[f+"Url"]=url||""; }
async function syncField(i,f,text,url){ const j=JOBS[i]; if(!CAN_WRITE||!j._row){ toast("Preview only — connect the sheet to save",true); return; }
  try{ let u; if(f==="status"){ u=apiURL("action=setStatus&row="+j._row+"&status="+encodeURIComponent(text)); } else { u=apiURL("action=setCell&row="+j._row+"&col="+FIELD_COL[f]+"&text="+encodeURIComponent(text)+"&url="+encodeURIComponent(url||"")); }
    const r=await fetch(u,{cache:"no-store"}); if(!r.ok||(await r.json()).ok===false)throw 0; if(f==="status")updateSync();
  }catch(e){ toast("Couldn't save — refreshing",true); load(); } }
function applyField(i,f,val,record){ const j=JOBS[i]; const before=fieldGet(j,f); if(before.text===val.text&&(before.url||"")===(val.url||""))return;
  fieldSet(j,f,val.text,val.url); if(f==="status")buildChips(); render(); syncField(i,f,val.text,val.url);
  if(record){ UNDO.push({kind:"field",i,f,before,after:{text:val.text,url:val.url||""}}); if(UNDO.length>200)UNDO.shift(); REDO=[]; updateUndoBtns(); } }
function commitEdit(val){ if(!EDIT)return; const {i,f}=EDIT; const url=(f==="order")?(JOBS[i].orderUrl||""):""; EDIT=null; applyField(i,f,{text:val,url},true); }
function clearSelected(){ if(!SELECTED)return; const {i,f}=SELECTED; applyField(i,f,{text:"",url:""},true); }
function removeFile(i,key){ applyField(i,key,{text:"",url:""},true); }

/* ===== undo / redo ===== */
let UNDO=[], REDO=[];
function updateUndoBtns(){ const u=document.getElementById("undoBtn"),r=document.getElementById("redoBtn"); if(u)u.disabled=!UNDO.length; if(r)r.disabled=!REDO.length; }
function doReorder(fromIdx,toIdx,record){ if(fromIdx===toIdx)return; const ref=JOBS[fromIdx],fromRow=ref._row;
  JOBS.splice(fromIdx,1); JOBS.splice(toIdx,0,ref); JOBS.forEach((j,k)=>{j._row=k+2;}); render();
  if(CAN_WRITE)persistMove(fromRow,toIdx+2); else toast("Reordered (preview — connect the sheet to save)");
  if(record){ UNDO.push({kind:"reorder",ref,before:fromIdx,after:toIdx}); if(UNDO.length>200)UNDO.shift(); REDO=[]; updateUndoBtns(); } }
function undo(){ const cmd=UNDO.pop(); if(!cmd)return;
  if(cmd.kind==="field"){ const j=JOBS[cmd.i]; fieldSet(j,cmd.f,cmd.before.text,cmd.before.url); if(cmd.f==="status")buildChips(); render(); syncField(cmd.i,cmd.f,cmd.before.text,cmd.before.url); }
  else if(cmd.kind==="reorder"){ const cur=JOBS.indexOf(cmd.ref); if(cur>=0)doReorder(cur,cmd.before,false); }
  REDO.push(cmd); updateUndoBtns(); toast("Undo"); }
function redo(){ const cmd=REDO.pop(); if(!cmd)return;
  if(cmd.kind==="field"){ const j=JOBS[cmd.i]; fieldSet(j,cmd.f,cmd.after.text,cmd.after.url); if(cmd.f==="status")buildChips(); render(); syncField(cmd.i,cmd.f,cmd.after.text,cmd.after.url); }
  else if(cmd.kind==="reorder"){ const cur=JOBS.indexOf(cmd.ref); if(cur>=0)doReorder(cur,cmd.after,false); }
  UNDO.push(cmd); updateUndoBtns(); toast("Redo"); }
(function(){
  const body=document.getElementById("rows");
  body.addEventListener("click",e=>{ if(EDIT)return; if(e.target.closest("a,.attach,.addf,.rmv,.pill,.grip")) return; const td=e.target.closest("td.cell"); if(!td){SELECTED=null;applySelection();return;} selectCell(td.dataset.i,td.dataset.f); });
  body.addEventListener("dblclick",e=>{ const td=e.target.closest("td.cell"); if(!td)return; if(EDITABLE_TEXT.includes(td.dataset.f)) startEdit(td.dataset.i,td.dataset.f); });
})();
document.addEventListener("keydown",e=>{
  if(EDIT)return; const tag=(e.target.tagName||"").toLowerCase(); if(tag==="input"||tag==="textarea")return;
  const mod=e.metaKey||e.ctrlKey;
  if(mod && (e.key==="z"||e.key==="Z")){ e.preventDefault(); if(e.shiftKey)redo(); else undo(); return; }
  if(mod && (e.key==="y"||e.key==="Y")){ e.preventDefault(); redo(); return; }
  if(!SELECTED)return;
  if(e.key==="Delete"||e.key==="Backspace"){ e.preventDefault(); clearSelected(); }
  else if(e.key==="Enter"){ if(EDITABLE_TEXT.includes(SELECTED.f)){ e.preventDefault(); startEdit(SELECTED.i,SELECTED.f); } }
  else if(e.key==="Escape"){ SELECTED=null; applySelection(); }
});

/* ===== column resize (drag header edges; widths persist) ===== */
const COLDEF=[40,182,112,58,290,150,132,132,132,150,150];
function loadColW(){try{const s=JSON.parse(localStorage.getItem("cobra-colw"));if(Array.isArray(s)&&s.length===COLDEF.length)return s;}catch(e){}return null;}
function saveColW(w){try{localStorage.setItem("cobra-colw",JSON.stringify(w));}catch(e){}}
let COLS=null, COLW=loadColW()||COLDEF.slice();
function initTable(){
  const table=document.querySelector('.card table');
  if(!table||table.querySelector('colgroup'))return;
  const ths=[...table.querySelectorAll('thead th')];
  const cg=document.createElement('colgroup');
  ths.forEach((th,i)=>{const c=document.createElement('col');c.style.width=(COLW[i]||COLDEF[i])+'px';cg.appendChild(c);
    if(i<ths.length-1){const h=document.createElement('span');h.className='rz';h.dataset.col=i;th.appendChild(h);}});
  table.insertBefore(cg,table.querySelector('thead'));
  table.style.tableLayout='fixed';table.style.minWidth=COLW.reduce((a,b)=>a+b,0)+'px';
  COLS=[...cg.querySelectorAll('col')];
  let rz=null;
  table.querySelectorAll('.rz').forEach(h=>{
    h.addEventListener('pointerdown',e=>{e.preventDefault();e.stopPropagation();const i=+h.dataset.col;rz={i};rz.x=e.clientX;rz.w=COLS[i].getBoundingClientRect().width;try{h.setPointerCapture(e.pointerId);}catch(_){}});
    h.addEventListener('pointermove',e=>{if(!rz)return;const nw=Math.max(46,Math.min(680,rz.w+(e.clientX-rz.x)));COLS[rz.i].style.width=nw+'px';COLW[rz.i]=nw;table.style.minWidth=COLW.reduce((a,b)=>a+b,0)+'px';});
    h.addEventListener('pointerup',()=>{if(rz){saveColW(COLW);rz=null;}});
  });
}

/* ===== drag-to-reorder rows (unfiltered All view; writes new order to sheet) ===== */
function canReorder(){return FILTER==='all' && !document.getElementById('search').value.trim();}
function refreshReorderable(){const el=document.getElementById('rows');if(el)el.classList.toggle('reorderable',canReorder());}
let drag=null;
function clearDrop(){document.querySelectorAll('#rows tr.drop-before,#rows tr.drop-after').forEach(r=>r.classList.remove('drop-before','drop-after'));}
document.getElementById('rows').addEventListener('pointerdown',e=>{
  const grip=e.target.closest('.grip'); if(!grip)return;
  if(!canReorder()){toast('Clear filters & search to reorder',true);return;}
  e.preventDefault();
  const tr=grip.closest('tr'); drag={from:+tr.dataset.idx,tr,to:null};
  tr.classList.add('dragging'); try{grip.setPointerCapture(e.pointerId);}catch(_){}
  document.addEventListener('pointermove',dragMove);
  document.addEventListener('pointerup',dragUp,{once:true});
});
function dragMove(e){
  if(!drag)return;
  const rows=[...document.querySelectorAll('#rows tr')]; clearDrop();
  let placed=false;
  for(const r of rows){const b=r.getBoundingClientRect();if(e.clientY<b.top+b.height/2){r.classList.add('drop-before');drag.to=+r.dataset.idx;placed=true;break;}}
  if(!placed){rows[rows.length-1].classList.add('drop-after');drag.to=JOBS.length;}
}
function dragUp(){
  document.removeEventListener('pointermove',dragMove);
  if(!drag)return;
  const from=drag.from, to=(drag.to==null?from:drag.to);
  clearDrop(); if(drag.tr)drag.tr.classList.remove('dragging'); drag=null;
  if(to===from||to===from+1)return;
  const ins=to>from?to-1:to;
  doReorder(from,ins,true);
}
async function persistMove(fromRow,toRow){
  try{
    const u=CONFIG.APPS_SCRIPT_URL+(CONFIG.APPS_SCRIPT_URL.includes("?")?"&":"?")+"action=moveRow&from="+fromRow+"&to="+toRow;
    const r=await fetch(u,{cache:"no-store"}); if(!r.ok||(await r.json()).ok===false)throw 0;
    toast('Order saved to sheet');
  }catch(e){toast("Couldn't save order — refreshing",true);load();}
}

setInterval(function(){
  if(!IS_LIVE || document.hidden) return;
  if(document.getElementById("menu").classList.contains("open")) return;
  if(document.getElementById("sheet").classList.contains("open")) return;
  load();
}, 45000);
