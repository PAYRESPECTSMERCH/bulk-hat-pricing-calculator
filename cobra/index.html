<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#f5f5f7" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#0f1012" media="(prefers-color-scheme: dark)">
<title>Cobra Digitize · Digitizing Queue</title>
<link rel="manifest" href="./manifest.json">
<style>
  :root{
    --bg:#f5f5f7; --panel:#ffffff; --panel-2:#fafafb; --hover:#fbfbfd;
    --ink:#1d1d1f; --muted:#86868b; --line:#ececee; --line-2:#f2f4f7;
    --accent:#0071e3; --accent-weak:#eaf3fe; --brand:#e0a400;
    --q:#5a5a5f; --qbg:#eeeef0; --qdot:#8e8e93;
    --m:#a86500; --mbg:#fdf0dc; --mdot:#d99000;
    --d:#137a3a; --dbg:#e7f7ee; --ddot:#1a9e4b;
    --puff:#6d3bff; --puffbg:#efeaff;
    --focus:#0071e3;
    --sh-sm:0 1px 2px rgba(16,24,40,.05);
    --sh-md:0 1px 3px rgba(16,24,40,.05),0 12px 34px rgba(16,24,40,.07);
    --sh-pop:0 8px 30px rgba(0,0,0,.18),0 0 0 1px rgba(0,0,0,.05);
    --ring:rgba(0,0,0,.14);
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#0f1012; --panel:#1a1c1e; --panel-2:#202224; --hover:#232527;
      --ink:#f2f2f4; --muted:#98999e; --line:#2a2c2f; --line-2:#242628;
      --accent:#0a84ff; --accent-weak:#12233a; --brand:#f0b420;
      --q:#b6b7bc; --qbg:#2c2e31; --qdot:#8e8e93;
      --m:#f0b64a; --mbg:#3a2c12; --mdot:#e6a52e;
      --d:#5fd08a; --dbg:#123322; --ddot:#37c46f;
      --puff:#b39dff; --puffbg:#2a2340;
      --focus:#4aa3ff; --ring:rgba(255,255,255,.22);
      --sh-md:0 1px 3px rgba(0,0,0,.4),0 12px 34px rgba(0,0,0,.5);
      --sh-pop:0 10px 34px rgba(0,0,0,.6),0 0 0 1px rgba(255,255,255,.06);
    }
  }
  :root[data-theme="light"]{
    --bg:#f5f5f7; --panel:#ffffff; --panel-2:#fafafb; --hover:#fbfbfd;
    --ink:#1d1d1f; --muted:#86868b; --line:#ececee; --line-2:#f2f4f7;
    --accent:#0071e3; --accent-weak:#eaf3fe; --brand:#e0a400;
    --q:#5a5a5f; --qbg:#eeeef0; --qdot:#8e8e93; --m:#a86500; --mbg:#fdf0dc; --mdot:#d99000;
    --d:#137a3a; --dbg:#e7f7ee; --ddot:#1a9e4b; --puff:#6d3bff; --puffbg:#efeaff;
    --focus:#0071e3; --ring:rgba(0,0,0,.14);
    --sh-md:0 1px 3px rgba(16,24,40,.05),0 12px 34px rgba(16,24,40,.07);
    --sh-pop:0 8px 30px rgba(0,0,0,.18),0 0 0 1px rgba(0,0,0,.05);
  }
  :root[data-theme="dark"]{
    --bg:#0f1012; --panel:#1a1c1e; --panel-2:#202224; --hover:#232527;
    --ink:#f2f2f4; --muted:#98999e; --line:#2a2c2f; --line-2:#242628;
    --accent:#0a84ff; --accent-weak:#12233a; --brand:#f0b420;
    --q:#b6b7bc; --qbg:#2c2e31; --qdot:#8e8e93; --m:#f0b64a; --mbg:#3a2c12; --mdot:#e6a52e;
    --d:#5fd08a; --dbg:#123322; --ddot:#37c46f; --puff:#b39dff; --puffbg:#2a2340;
    --focus:#4aa3ff; --ring:rgba(255,255,255,.22);
    --sh-md:0 1px 3px rgba(0,0,0,.4),0 12px 34px rgba(0,0,0,.5);
    --sh-pop:0 10px 34px rgba(0,0,0,.6),0 0 0 1px rgba(255,255,255,.06);
  }

  :root[data-theme="warm"]{
    --bg:#f2ede3; --panel:#fbf8f2; --panel-2:#f0eadf; --hover:#f6f1e8;
    --ink:#2b2620; --muted:#8a8175; --line:#e6ddcd; --line-2:#efe8db;
    --accent:#b8791f; --accent-weak:#f6ecd6; --brand:#c8871a;
    --q:#6a6154; --qbg:#eae2d3; --qdot:#a99a82; --m:#a86500; --mbg:#f6e6cc; --mdot:#c98a20;
    --d:#3f7a3a; --dbg:#e2efd8; --ddot:#4f9a45; --puff:#7c4dff; --puffbg:#efeaff;
    --focus:#b8791f; --ring:rgba(60,40,10,.18);
    --sh-sm:0 1px 2px rgba(80,60,20,.06);
    --sh-md:0 1px 3px rgba(80,60,20,.07),0 12px 30px rgba(80,60,20,.10);
    --sh-pop:0 8px 30px rgba(80,60,20,.22),0 0 0 1px rgba(80,60,20,.06);
  }

  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Inter,system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;transition:background .2s,color .2s}
  :focus-visible{outline:2.5px solid var(--focus);outline-offset:2px;border-radius:8px}
  .wrap{max-width:1780px;margin:0 auto;padding:20px 24px 72px}

  /* app bar */
  .bar{display:flex;align-items:center;gap:13px;margin-bottom:18px}
  .mark{width:40px;height:40px;border-radius:11px;background:linear-gradient(135deg,var(--brand),#f6c453);
    color:#231a00;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:20px;flex-shrink:0;
    box-shadow:0 4px 14px rgba(224,165,0,.3)}
  .brand{min-width:0}
  .brand .n{font-weight:700;font-size:16px;letter-spacing:-.3px;line-height:1.05}
  .brand .s{font-size:11.5px;color:var(--muted);letter-spacing:.3px}
  .barspace{flex:1}
  .iconbtn{background:var(--panel);border:1px solid var(--line);border-radius:11px;width:40px;height:40px;
    font-size:17px;cursor:pointer;color:var(--ink);display:inline-flex;align-items:center;justify-content:center;transition:transform .1s}
  .iconbtn:active{transform:scale(.93)}
  .iconbtn.spin svg,.iconbtn.spin span{animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* title + sync */
  .titlerow{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:16px}
  h1{margin:0;font-size:24px;font-weight:750;letter-spacing:-.5px;line-height:1.1}
  .sync{font-size:12.5px;color:var(--muted);margin-top:5px;display:inline-flex;align-items:center;gap:7px}
  .dot{width:7px;height:7px;border-radius:50%;display:inline-block}
  .dot.live{background:var(--ddot);box-shadow:0 0 0 3px color-mix(in srgb,var(--ddot) 22%,transparent)}
  .dot.samp{background:var(--mdot);box-shadow:0 0 0 3px color-mix(in srgb,var(--mdot) 22%,transparent)}
  .search{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:10px 13px;font-size:14px;
    width:250px;max-width:100%;color:var(--ink);box-shadow:var(--sh-sm)}
  .search::placeholder{color:var(--muted);opacity:.8}

  /* filter / count chips */
  .chips{display:flex;gap:9px;margin-bottom:16px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
  .chips::-webkit-scrollbar{display:none}
  .chip-f{flex:0 0 auto;display:inline-flex;align-items:center;gap:8px;background:var(--panel);
    border:1px solid var(--line);border-radius:12px;padding:9px 14px;font-size:13.5px;font-weight:600;
    color:var(--ink);cursor:pointer;box-shadow:var(--sh-sm);transition:border-color .15s,background .15s}
  .chip-f .cdot{width:8px;height:8px;border-radius:50%}
  .chip-f .cnt{font-variant-numeric:tabular-nums;color:var(--muted);font-weight:700;
    background:var(--panel-2);border-radius:20px;padding:1px 8px;font-size:12px}
  .chip-f.on{border-color:var(--accent);background:var(--accent-weak)}
  .chip-f.on .cnt{color:var(--accent)}

  /* table */
  .card{background:var(--panel);border-radius:18px;box-shadow:var(--sh-md);overflow:hidden}
  .scroll{overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:13.5px;min-width:1160px}
  thead th{background:var(--panel-2);text-align:left;color:var(--muted);font-size:11px;font-weight:700;
    letter-spacing:.6px;text-transform:uppercase;padding:13px 14px;border-bottom:1px solid var(--line);white-space:nowrap;position:sticky;top:0;z-index:2}
  thead th.grp{border-left:1px solid var(--line)}
  tbody td{padding:14px;border-bottom:1px solid var(--line-2);vertical-align:top}
  tbody tr:last-child td{border-bottom:none}
  tbody tr{transition:background .12s}
  tbody tr:hover{background:var(--hover)}

  .pill{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:700;padding:5px 11px;
    border-radius:99px;white-space:nowrap;border:1px solid transparent;font-family:inherit;line-height:1}
  .pill::before{content:"";width:6px;height:6px;border-radius:50%;background:currentColor}
  .pill.act{cursor:pointer}
  .pill.act::after{content:"⌄";margin-left:1px;font-size:12px;opacity:.6}
  .p-q{background:var(--qbg);color:var(--q)} .p-m{background:var(--mbg);color:var(--m)} .p-d{background:var(--dbg);color:var(--d)}
  tbody td .pill{white-space:normal;text-align:left;max-width:100%}
  .order{font-weight:600;font-variant-numeric:tabular-nums;letter-spacing:.2px}
  .puff{font-size:10px;font-weight:800;color:#fff;background:#d93a34;border-radius:6px;padding:3px 6px;letter-spacing:.4px;white-space:nowrap;box-shadow:0 1px 2px rgba(217,58,52,.35)}
  .details{max-width:320px;line-height:1.45;color:var(--ink)}
  .details .qty{display:inline-block;margin-left:6px;font-size:11px;font-weight:700;color:var(--m);background:var(--mbg);border-radius:6px;padding:2px 7px;white-space:nowrap}
  .details .flag{display:inline-block;margin-left:6px;font-size:11px;font-weight:700;color:var(--accent);background:var(--accent-weak);border-radius:6px;padding:2px 7px;white-space:nowrap}
  .plc{border-left:1px solid var(--line)}
  .chip .nm{font-weight:600;font-size:12.5px} .chip .sz{color:var(--muted);font-variant-numeric:tabular-nums;font-size:12px;white-space:nowrap}
  .none{color:color-mix(in srgb,var(--muted) 55%,transparent)}
  .rownum{color:var(--muted);font-variant-numeric:tabular-nums;font-weight:600;font-size:12px;text-align:right;width:34px;white-space:nowrap}
  th.rownum-h{width:34px;text-align:right}
  .details .dl{display:block;line-height:1.5}
  .details .dl b{display:inline-block;min-width:42px;font-size:10px;font-weight:800;letter-spacing:.4px;color:var(--muted);vertical-align:top}
  .details .dlead{display:block;margin-bottom:3px;font-weight:600}
  .jc .rn{font-size:11px;font-weight:700;color:var(--muted);font-variant-numeric:tabular-nums;background:var(--panel-2);border-radius:6px;padding:2px 7px;margin-right:2px}
  /* drag-to-reorder */
  .rownum{white-space:nowrap}
  .grip{display:none;cursor:grab;color:var(--muted);font-size:13px;margin-right:5px;touch-action:none;user-select:none;vertical-align:middle}
  .reorderable .grip{display:inline}
  .grip:active{cursor:grabbing}
  tr.dragging{opacity:.45}
  tr.drop-before td{box-shadow:inset 0 3px 0 -1px var(--accent)}
  tr.drop-after td{box-shadow:inset 0 -3px 0 -1px var(--accent)}
  /* column resize */
  thead th{position:relative}
  .rz{position:absolute;top:0;right:-1px;width:9px;height:100%;cursor:col-resize;user-select:none;touch-action:none;z-index:3}
  .rz:hover{background:linear-gradient(var(--accent),var(--accent));background-size:2px 100%;background-position:center;background-repeat:no-repeat;opacity:.5}
  /* clickable artwork cells */
  .plc{cursor:pointer}
  .plc:hover{background:var(--accent-weak)}
  .jc .pr{cursor:pointer;border-radius:8px;margin:-2px -4px;padding:2px 4px}
  .jc .pr:active{background:var(--accent-weak)}
  .thread{display:flex;align-items:center;gap:8px;max-width:190px}
  .sw{display:flex;flex-shrink:0}
  .sw i{width:14px;height:14px;border-radius:50%;box-shadow:inset 0 0 0 1.4px var(--ring);margin-left:-4px}
  .sw i:first-child{margin-left:0}
  .tlabel{font-size:12.5px;color:var(--ink);line-height:1.25}
  .folder{display:inline-flex;align-items:center;gap:7px;color:var(--accent);font-weight:600;font-size:12.5px;font-variant-numeric:tabular-nums;text-decoration:none}
  .folder:hover{text-decoration:underline}

  /* mobile cards */
  .cards{display:none;flex-direction:column;gap:12px}
  .jc{background:var(--panel);border-radius:16px;padding:15px 16px;box-shadow:var(--sh-md);display:flex;flex-direction:column;gap:11px}
  .jc .t{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .jc .co{display:flex;align-items:center;gap:8px;min-width:0}
  .jc .o{font-size:12.5px;font-weight:700;color:var(--muted);font-variant-numeric:tabular-nums;letter-spacing:.2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .jc .jt{font-size:17px;font-weight:700;letter-spacing:-.3px;line-height:1.25}
  .jc .pl{display:flex;flex-direction:column;gap:6px;border-top:1px solid var(--line);padding-top:11px}
  .jc .pr{display:flex;align-items:center;gap:9px}
  .ploc{font-size:9.5px;font-weight:800;letter-spacing:.5px;color:var(--panel);background:var(--ink);border-radius:6px;padding:3px 0;width:42px;text-align:center;flex-shrink:0}
  .ploc.b{opacity:.72}.ploc.l{opacity:.56}.ploc.r{opacity:.42}
  .jc .pn{font-size:13.5px;font-weight:600;flex:1}
  .jc .ps{font-size:12.5px;color:var(--muted);font-variant-numeric:tabular-nums;font-weight:600}
  .jc .b{display:flex;align-items:center;justify-content:space-between;gap:10px;border-top:1px solid var(--line);padding-top:11px}

  /* desktop popover menu */
  .menu{position:fixed;z-index:80;background:var(--panel);border-radius:13px;padding:6px;min-width:180px;box-shadow:var(--sh-pop);display:none}
  .menu.open{display:block}
  .mi{display:flex;align-items:center;gap:10px;padding:11px;border-radius:9px;font-size:14px;font-weight:600;cursor:pointer;color:var(--ink)}
  .mi:hover{background:var(--panel-2)}
  .mi .sd{width:10px;height:10px;border-radius:50%}
  .mi.cur{color:var(--muted)} .mi.cur::after{content:"✓";margin-left:auto;color:var(--accent)}

  /* mobile bottom sheet */
  .scrim{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:90;opacity:0;pointer-events:none;transition:opacity .2s}
  .scrim.open{opacity:1;pointer-events:auto}
  .sheet{position:fixed;left:0;right:0;bottom:0;z-index:91;background:var(--panel);border-radius:22px 22px 0 0;
    padding:8px 16px calc(20px + env(safe-area-inset-bottom));transform:translateY(110%);transition:transform .26s cubic-bezier(.32,.72,0,1);box-shadow:0 -10px 40px rgba(0,0,0,.25)}
  .sheet.open{transform:translateY(0)}
  .sheet .grip{width:38px;height:5px;border-radius:99px;background:var(--line);margin:8px auto 12px}
  .sheet .sh-h{font-size:13px;color:var(--muted);font-weight:600;padding:0 4px 8px}
  .sheet .si{display:flex;align-items:center;gap:12px;padding:15px 12px;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer}
  .sheet .si:active{background:var(--panel-2)}
  .sheet .si .sd{width:12px;height:12px;border-radius:50%}
  .sheet .si.cur::after{content:"✓";margin-left:auto;color:var(--accent);font-weight:800}

  .empty{padding:64px 20px;text-align:center;color:var(--muted);font-size:15px}
  .foot{display:flex;justify-content:space-between;align-items:center;margin-top:14px;font-size:12px;color:var(--muted);padding:0 4px;flex-wrap:wrap;gap:8px}

  /* skeleton */
  .sk{height:16px;border-radius:6px;background:linear-gradient(90deg,var(--line-2),var(--panel-2),var(--line-2));background-size:200% 100%;animation:sh 1.2s infinite}
  @keyframes sh{to{background-position:-200% 0}}

  /* toast */
  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:#1d1d1f;color:#fff;
    font-size:13.5px;font-weight:600;padding:11px 18px;border-radius:12px;box-shadow:0 10px 30px rgba(0,0,0,.28);
    opacity:0;pointer-events:none;transition:.25s;z-index:100;display:inline-flex;align-items:center;gap:9px}
  .toast .tk{width:8px;height:8px;border-radius:50%;background:var(--ddot)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .toast.err{background:#b3261e} .toast.err .tk{background:#fff}

  @media (prefers-reduced-motion: reduce){*{animation-duration:.001ms!important;transition-duration:.001ms!important}}
  @media (max-width:820px){
    .wrap{padding:16px 12px 60px}
    .card{display:none} .cards{display:flex}
    .jc .t .pill{white-space:normal;text-align:center;max-width:64%;line-height:1.25}
    .search{width:100%;order:5;margin-top:2px}
    .titlerow{gap:8px}
    h1{font-size:21px}
  }
</style>
</head>
<body>
<div class="wrap">
  <!-- app bar -->
  <div class="bar">
    <div class="mark">C</div>
    <div class="brand"><div class="n">Cobra Digitize</div><div class="s">Apparel Hotline</div></div>
    <div class="barspace"></div>
    <button class="iconbtn" id="theme" title="Toggle theme" aria-label="Toggle light or dark theme" onclick="toggleTheme()"><span id="themeIcon">◐</span></button>
    <button class="iconbtn" id="refresh" title="Refresh from sheet" aria-label="Refresh from sheet" onclick="load()"><span>⟳</span></button>
  </div>

  <!-- title + search -->
  <div class="titlerow">
    <div>
      <h1>Digitizing Queue</h1>
      <div class="sync" id="sync"><span class="dot samp"></span> Loading…</div>
    </div>
    <input class="search" id="search" placeholder="Search order, design, thread…" aria-label="Search jobs" oninput="render()">
  </div>

  <!-- filters -->
  <div class="chips" id="chips" role="tablist" aria-label="Filter by status"></div>

  <!-- desktop table -->
  <div class="card">
    <div class="scroll">
      <table>
        <thead><tr>
          <th class="rownum-h">#</th><th>Status</th><th>Order</th><th>3D</th><th>Details</th>
          <th class="grp">Front</th><th class="grp">Back</th><th class="grp">Left</th><th class="grp">Right</th>
          <th>Thread</th><th>Digitize Folder</th>
        </tr></thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
  </div>
  <!-- mobile cards -->
  <div class="cards" id="cards"></div>

  <div class="foot">
    <span id="count"></span>
    <span>Cobra Digitize · mirrors the live Google Sheet</span>
  </div>
</div>

<div class="menu" id="menu" role="menu" aria-label="Change status"></div>
<div class="scrim" id="scrim" onclick="closeSheet()"></div>
<div class="sheet" id="sheet" role="dialog" aria-modal="true" aria-label="Change status">
  <div class="grip"></div><div class="sh-h" id="sheetHead">Change status</div><div id="sheetBody"></div>
</div>
<div class="toast" id="toast"><span class="tk"></span><span id="toastMsg"></span></div>

<script>
/* ===== CONFIG (see cobra/SETUP.md) ===== */
const CONFIG={
  APPS_SCRIPT_URL:"",   // paste /exec URL for live read + write-back
  SHEET_ID:"1Lu4wSwQyc3dn4XTkbY3WXWKkF3SI3I-bI4O8TYm8hsI",
  GID:"0", USE_LIVE:true
};

/* ===== status model — mirrors the sheet's STATUS dropdown (labels + colors) ===== */
const STATUS=[
  {key:"",label:"Unassigned",bg:null,fg:"var(--muted)",dot:"#b0b0b6",rank:5},
  {key:"READY",label:"READY",bg:"#202124",fg:"#ffffff",dot:"#202124",rank:6},
  {key:"SEND MOCKUP",label:"SEND MOCKUP",bg:"#8b3dd6",fg:"#ffffff",dot:"#8b3dd6",rank:7},
  {key:"WAITING ON CUSTOMER APPROVAL",label:"WAITING ON CUSTOMER APPROVAL",bg:"#f9d2c4",fg:"#8a3d24",dot:"#e8825f",rank:8},
  {key:"DESIGN QUESTIONS",label:"DESIGN QUESTIONS",bg:"#fce9a6",fg:"#7a6008",dot:"#e6b800",rank:3},
  {key:"UPDATE ARTWORK",label:"UPDATE ARTWORK",bg:"#d93a34",fg:"#ffffff",dot:"#d93a34",rank:2},
  {key:"CUSTOMER APPROVED",label:"CUSTOMER APPROVED",bg:"#c8e9c1",fg:"#2c6b2a",dot:"#46b649",rank:9},
  {key:"CANNOT FIND ORDER DETAILS",label:"CANNOT FIND ORDER DETAILS",bg:"#9e1414",fg:"#ffffff",dot:"#9e1414",rank:0},
  {key:"HELP FIND ORDER #",label:"HELP FIND ORDER #",bg:"#f0a24a",fg:"#5a3410",dot:"#ef9430",rank:1},
  {key:"COMPLETED",label:"COMPLETED",bg:"#16a34a",fg:"#ffffff",dot:"#16a34a",rank:10},
  {key:"REVIEW DETAILS",label:"REVIEW DETAILS",bg:"#1a6fe0",fg:"#ffffff",dot:"#1a6fe0",rank:4}
];
const SMAP={};STATUS.forEach(s=>SMAP[s.key]=s);

const COLORS={"yellow gold":"#e0a400","baby blue":"#7dd3fc","royal blue":"#1d4ed8","forest green":"#166534","navy":"#1e2a52","black":"#111111","white":"#ffffff","royal":"#1d4ed8","gold":"#e0a400","yellow":"#f2c200","pink":"#ec4899","purple":"#7c3aed","green":"#1a9e4b","red":"#d21f28","cream":"#f3ecd8","brown":"#7c4a1e","tan":"#d2b48c","orange":"#f97316","blue":"#2563eb","grey":"#9ca3af","gray":"#9ca3af","natural":"#efe7d6","maroon":"#7f1d1d","teal":"#0e8a89","silver":"#c0c0c8","charcoal":"#36454f"};
const PH=Object.keys(COLORS).filter(k=>k.includes(" "));
function swatches(t){if(!t)return[];let x=String(t).toLowerCase();const f=[];for(const p of PH){if(x.includes(p)){f.push(COLORS[p]);x=x.split(p).join("  ");}}for(const w of Object.keys(COLORS)){if(w.includes(" "))continue;const re=new RegExp("\\b"+w+"\\b");if(re.test(x)){f.push(COLORS[w]);x=x.replace(re,"  ");}}return f.slice(0,3);}
function threadLabel(t){if(!t)return"";return String(t).replace(/^\s*thread\s*/i,"").replace(/\s+/g," ").trim().replace(/\bwith\b/gi,"w/");}

/* ===== placement ===== */
function parsePlc(cell){if(!cell||!String(cell).trim())return null;let s=String(cell).trim();let size="";const m=s.match(/([\d.]+)\s*["″'’]?\s*W\b/i);if(m){size=m[1].replace(/\.$/,"")+'" W';s=s.replace(m[0],"");}s=s.replace(/\((front|back|left|right)\)/ig,"").replace(/\b(front|back|left|right)\b/ig,"").replace(/[:]/g,"").replace(/\s{2,}/g," ").replace(/[-–—·|]\s*$/,"").trim();if(s.length>24)s=s.slice(0,23).trim()+"…";return{name:s.toUpperCase(),size};}

/* ===== details ===== */
function detailsHTML(text){if(!text)return'<span class="none">—</span>';let s=String(text).trim();let extra="";
  const q=s.match(/qty\s*[:\-]?\s*(\d+)/i); if(q){extra+=' <span class="qty">Qty '+q[1]+'</span>';s=s.replace(q[0],"");}
  if(/needs?\s+in\s+\w+/i.test(s)){const mm=s.match(/needs?\s+in\s+\w+/i);extra+=' <span class="flag">'+esc(mm[0].replace(/^./,c=>c.toUpperCase()))+'</span>';s=s.replace(mm[0],"");}
  if(/check messages|need more info/i.test(s)){extra+=' <span class="flag">Check messages</span>';s=s.replace(/\(?\s*(check messages|need more info)\s*\)?/ig,"");}
  s=s.replace(/\bthread\b[\s\S]*$/i,"").trim();
  // If the details name placements (FRONT:/BACK:/LEFT:/RIGHT:), break them onto labeled lines
  if(/\b(FRONT|BACK|LEFT|RIGHT)\s*:/i.test(s)){
    const parts=s.split(/\b(FRONT|BACK|LEFT|RIGHT)\s*:/i);
    const lead=(parts[0]||"").replace(/[\/,\-–—]\s*$/,"").trim();
    let html=lead?'<span class="dlead">'+esc(lead)+'</span>':'';
    for(let i=1;i<parts.length;i+=2){
      const lab=parts[i].toUpperCase();
      const val=(parts[i+1]||"").replace(/[\/,\-–—]\s*$/,"").replace(/\s{2,}/g," ").trim();
      if(val) html+='<span class="dl"><b>'+lab+'</b> '+esc(val)+'</span>';
    }
    return (html||'<span class="none">—</span>')+extra;
  }
  s=s.replace(/^front:\s*/i,"").replace(/[\/,\-–—]\s*$/,"").replace(/\s{2,}/g," ").trim();
  if(s.length>140)s=s.slice(0,138)+"…";
  return (esc(s)||'<span class="none">—</span>')+extra;}
function jobTitle(j){let s=String(j.details||j.front||j.order||"").trim();s=s.replace(/qty\s*[:\-]?\s*\d+/i,"").replace(/\bthread\b[\s\S]*$/i,"").replace(/^front:\s*/i,"").replace(/\(.*?\)/g,"").replace(/[-–—][\s\S]*$/,"").replace(/[\/,]\s*$/,"").replace(/\s{2,}/g," ").trim();if(s.length>40)s=s.slice(0,38).trim()+"…";return s||"—";}
function esc(x){return String(x==null?"":x).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}

/* ===== CSV ===== */
function parseCSV(text){const rows=[];let row=[],f="",i=0,q=false;while(i<text.length){const c=text[i];if(q){if(c==='"'){if(text[i+1]==='"'){f+='"';i++;}else q=false;}else f+=c;}else{if(c==='"')q=true;else if(c===','){row.push(f);f="";}else if(c==='\n'){row.push(f);rows.push(row);row=[];f="";}else if(c==='\r'){}else f+=c;}i++;}if(f.length||row.length){row.push(f);rows.push(row);}return rows;}

  const present=STATUS.filter(s=>c[s.key]).sort((a,b)=>a.rank-b.rank);
  const chips=[{key:"all",label:"All",dot:"var(--muted)",n:c.all}].concat(present.map(s=>({key:s.key,label:s.label,dot:s.dot,n:c[s.key]})));
  document.getElementById("chips").innerHTML=chips.map(ch=>`<button class="chip-f ${FILTER===ch.key?'on':''}" role="tab" aria-selected="${FILTER===ch.key}" data-key="${esc(ch.key)}"><span class="cdot" style="background:${ch.dot}"></span>${esc(ch.label)}<span class="cnt">${ch.n}</span></button>`).join("");}

function dragMove(e){
  if(!drag)return;
  const rows=[...document.querySelectorAll('#rows tr')]; clearDrop();
  let placed=false;
  for(const r of rows){const b=r.getBoundingClientRect();if(e.clientY<b.top+b.height/2){r.classList.add('drop-before');drag.to=+r.dataset.idx;placed=true;break;}}
  if(!placed){rows[rows.length-1].classList.add('drop-after');drag.to=JOBS.length;}
}
function dragUp(){
  document.removeEventListener('pointermove',dragMove);
  if(!drag)return;
  const from=drag.from, to=(drag.to==null?from:drag.to);
  clearDrop(); if(drag.tr)drag.tr.classList.remove('dragging'); drag=null;
  if(to===from||to===from+1)return;
  const fromRow=JOBS[from]._row;
  const it=JOBS.splice(from,1)[0];
  const ins=to>from?to-1:to;
  JOBS.splice(ins,0,it);
  JOBS.forEach((j,k)=>{j._row=k+2;});
  render();
  if(CAN_WRITE)persistMove(fromRow,ins+2);
  else toast('Reordered (preview — connect the sheet to save)');
}
async function persistMove(fromRow,toRow){
  try{
    const u=CONFIG.APPS_SCRIPT_URL+(CONFIG.APPS_SCRIPT_URL.includes("?")?"&":"?")+"action=moveRow&from="+fromRow+"&to="+toRow;
    const r=await fetch(u,{cache:"no-store"}); if(!r.ok||(await r.json()).ok===false)throw 0;
    toast('Order saved to sheet');
  }catch(e){toast("Couldn't save order — refreshing",true);load();}
}

load();
initTable();
/* auto-refresh: keep the app near-live with the sheet (only when connected) */
setInterval(function(){
  if(!IS_LIVE || document.hidden) return;
  if(document.getElementById("menu").classList.contains("open")) return;
  if(document.getElementById("sheet").classList.contains("open")) return;
  load();
}, 45000);
</script>
